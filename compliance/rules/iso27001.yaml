framework: "ISO 27001:2022"
rules:
  - id: "ISO-825-ENV"
    name: "Getrennte Umgebungen"
    check: "Getrennte Umgebungen (Dev/Staging/Prod)"
    severity: "MUSS"
  - id: "ISO-825-SECREQ"
    name: "Security Requirements"
    check: "security_requirements.yaml vorhanden"
    severity: "MUSS"
  - id: "ISO-825-SAST"
    name: "SAST bei Commit"
    check: "SAST (ruff security rules) bei jedem Commit"
    severity: "MUSS"
  - id: "ISO-825-BRANCH"
    name: "Branch Protection"
    check: "Branch-Protection auf main"
    severity: "MUSS"
  - id: "ISO-825-SPRINT"
    name: "Security-Checkliste"
    check: "Security-Checkliste bei Sprint-Start"
    severity: "MUSS"
  - id: "ISO-825-HISTORY"
    name: "Keine Secrets in History"
    check: "Keine Secrets in Git-History"
    severity: "MUSS"
  - id: "ISO-825-COMPETENCE"
    name: "OWASP in Prompts"
    check: "OWASP Top 10 in Agent-Prompts"
    severity: "MUSS"
  - id: "ISO-826-AUTH"
    name: "Auth-Schema"
    check: "Auth-Schema auf jedem Endpoint"
    severity: "MUSS"
  - id: "ISO-826-AUTHZ"
    name: "Authorization-Schema"
    check: "Authorization-Schema (Rollen/Scopes)"
    severity: "MUSS"
  - id: "ISO-826-INPUT"
    name: "Input-Validation"
    check: "Input-Validation-Constraints in API-Spec"
    severity: "MUSS"
  - id: "ISO-826-RATELIMIT"
    name: "Rate-Limiting"
    check: "Rate-Limiting auf öffentlichen Endpoints"
    severity: "SOLL"
  - id: "ISO-827-MTLS"
    name: "mTLS"
    check: "mTLS zwischen Services"
    severity: "MUSS"
  - id: "ISO-827-INPUTVAL"
    name: "Whitelist Validation"
    check: "Whitelist-Ansatz, serverseitig (Pydantic)"
    severity: "MUSS"
  - id: "ISO-827-ERROR"
    name: "Keine Stack-Traces"
    check: "Keine Stack-Traces an Client"
    severity: "MUSS"
  - id: "ISO-827-CRYPTO"
    name: "Aktuelle Kryptographie"
    check: "Nur aktuelle Algorithmen, keine eigene Crypto"
    severity: "MUSS"
  - id: "ISO-828-PARAM"
    name: "Parameterisierte Queries"
    check: "Parameterisierte Queries (SQLAlchemy ORM)"
    severity: "MUSS"
  - id: "ISO-828-SECRETS"
    name: "Keine hardcoded Secrets"
    check: "Keine hardcoded Secrets"
    severity: "MUSS"
  - id: "ISO-828-CVE"
    name: "Dependencies ohne CVEs"
    check: "Dependencies ohne Critical/High CVEs"
    severity: "MUSS"
  - id: "ISO-828-REVIEW"
    name: "Code Review"
    check: "Review durch zweiten Agenten"
    severity: "MUSS"
  - id: "ISO-829-SAST"
    name: "SAST"
    check: "SAST bei jedem Commit"
    severity: "MUSS"
  - id: "ISO-829-AUTHTEST"
    name: "Auth-Bypass-Tests"
    check: "Auth-Bypass-Tests"
    severity: "MUSS"
  - id: "ISO-831-NOREAL"
    name: "Keine Echtdaten"
    check: "Keine Echtdaten in Dev/Test"
    severity: "MUSS"
  - id: "ISO-831-CICD"
    name: "Prod via CI/CD"
    check: "Prod nur via CI/CD"
    severity: "MUSS"
  - id: "ISO-832-COMMITS"
    name: "Conventional Commits"
    check: "Conventional Commits + Compliance-Tags"
    severity: "MUSS"
  - id: "ISO-832-ROLLBACK"
    name: "Rollback-Strategie"
    check: "Rollback-Strategie dokumentiert"
    severity: "MUSS"
  - id: "ISO-MOBILE-STORAGE"
    name: "SecureStore für Sensitive Daten"
    check: "Sensitive Daten nur in SecureStore (nicht AsyncStorage/MMKV)"
    severity: "MUSS"
  - id: "ISO-MOBILE-PINNING"
    name: "Certificate Pinning"
    check: "Certificate Pinning für API-Calls (Production)"
    severity: "SOLL"
