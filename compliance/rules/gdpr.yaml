framework: "DSGVO"
version: "2016/679"
rules:
  - id: "GDPR-5.1A"
    name: "Rechtmäßigkeit"
    check: "Manifest enthält legal_basis für jeden Verarbeitungszweck"
    severity: "MUSS"
  - id: "GDPR-5.1B"
    name: "Zweckbindung"
    check: "Jedes Datenfeld einem dokumentierten Zweck zugeordnet"
    severity: "MUSS"
  - id: "GDPR-5.1C"
    name: "Datenminimierung"
    check: "Kein Datenfeld ohne Zweck im Manifest"
    severity: "MUSS"
  - id: "GDPR-5.1E-DECL"
    name: "Speicherbegrenzung (Deklaration)"
    check: "Manifest enthält retention_period für jede Kategorie"
    severity: "MUSS"
  - id: "GDPR-5.1E-IMPL"
    name: "Speicherbegrenzung (Implementierung)"
    check: "Automatisierter Löschmechanismus (APScheduler/Cron) implementiert"
    severity: "MUSS"
  - id: "GDPR-5.1F-REST"
    name: "Verschlüsselung at-rest"
    check: "AES-256+ für alle PII-Felder"
    severity: "MUSS"
  - id: "GDPR-5.1F-TRANSIT"
    name: "Verschlüsselung in-transit"
    check: "TLS 1.3, mTLS zwischen Services"
    severity: "MUSS"
  - id: "GDPR-7-CONSENT"
    name: "Consent-Endpoint"
    check: "Consent-API mit granularer Zweck-Auswahl"
    severity: "MUSS"
  - id: "GDPR-7-DEFAULT"
    name: "Keine Default-Consent"
    check: "Keine vorausgefüllten Checkboxen (Frontend + Backend)"
    severity: "MUSS"
  - id: "GDPR-15"
    name: "Auskunftsrecht"
    check: "GET-Endpoint liefert alle PII eines Betroffenen"
    severity: "MUSS"
  - id: "GDPR-17"
    name: "Löschungsrecht"
    check: "DELETE-Endpoint für Löschung/Anonymisierung"
    severity: "MUSS"
  - id: "GDPR-20"
    name: "Datenportabilität"
    check: "Export-Endpoint in JSON/CSV"
    severity: "MUSS"
  - id: "GDPR-25-DESIGN"
    name: "Privacy by Design"
    check: "Minimale Datenerhebung, Pseudonymisierung wo möglich"
    severity: "MUSS"
  - id: "GDPR-25-DEFAULT"
    name: "Privacy by Default"
    check: "Strengste Privacy-Einstellung als Default"
    severity: "MUSS"
  - id: "GDPR-32"
    name: "Zugangskontrollen"
    check: "RBAC implementiert (Supabase RLS + Backend)"
    severity: "MUSS"
  - id: "GDPR-33"
    name: "Meldepflicht"
    check: "Incident-Response-Playbook mit 72h-Frist dokumentiert"
    severity: "MUSS"
