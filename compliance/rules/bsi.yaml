framework: "BSI IT-Grundschutz"
rules:
  - id: "BSI-CON8-SDLC"
    name: "Secure SDLC"
    check: "CLAUDE.md mit Secure-SDLC-Regeln"
    severity: "MUSS"
  - id: "BSI-CON8-CODING"
    name: "Coding-Standards"
    check: "Coding-Standards durch Linting erzwungen (ruff + mypy + ESLint)"
    severity: "MUSS"
  - id: "BSI-CON8-THREAT"
    name: "Threat-Model"
    check: "Threat-Model bei Schutzbedarf hoch/sehr_hoch"
    severity: "SOLL"
  - id: "BSI-CON8-SECTEST"
    name: "Security Testing"
    check: "SAST + Dependency-Scan bei jedem Build"
    severity: "MUSS"
  - id: "BSI-CON8-RELEASE"
    name: "Quality-Gate"
    check: "3-stufiges Quality-Gate"
    severity: "MUSS"
  - id: "BSI-SYS16-IMAGE"
    name: "Minimale Base-Images"
    check: "Minimale Base-Images (python-slim/distroless)"
    severity: "MUSS"
  - id: "BSI-SYS16-NET"
    name: "NetworkPolicy"
    check: "NetworkPolicy pro Namespace"
    severity: "MUSS"
  - id: "BSI-SYS16-ROOT"
    name: "Non-Root Container"
    check: "Container als Non-Root (UID >= 1000)"
    severity: "MUSS"
  - id: "BSI-SYS16-RDONLY"
    name: "Read-Only Filesystem"
    check: "Read-Only Root-Filesystem wo möglich"
    severity: "SOLL"
  - id: "BSI-SYS16-LIMITS"
    name: "Resource-Limits"
    check: "CPU/Memory-Limits in Deployments"
    severity: "MUSS"
  - id: "BSI-SYS16-SCAN"
    name: "Container-Scan"
    check: "Container-Images auf CVEs gescannt"
    severity: "MUSS"
  - id: "BSI-SYS16-NOSECRETS"
    name: "Keine Secrets in Images"
    check: "Keine Secrets in Docker-Images"
    severity: "MUSS"
  - id: "BSI-NET11-ZEROTRUST"
    name: "Zero-Trust"
    check: "Zero-Trust NetworkPolicies"
    severity: "MUSS"
  - id: "BSI-NET11-MTLS"
    name: "mTLS Inter-Service"
    check: "mTLS für Inter-Service-Kommunikation"
    severity: "MUSS"
  - id: "BSI-OPS-RUNBOOK"
    name: "Runbook"
    check: "docs/runbook.md vorhanden"
    severity: "MUSS"
  - id: "BSI-OPS-HEALTH"
    name: "Health Endpoints"
    check: "/health und /ready Endpoints"
    severity: "MUSS"
  - id: "BSI-OPS-LOGGING"
    name: "Structured Logging"
    check: "Strukturiertes JSON-Logging, keine PII"
    severity: "MUSS"
  - id: "BSI-OPS-INCIDENT"
    name: "Incident-Response"
    check: "Incident-Response-Playbook dokumentiert"
    severity: "MUSS"
  - id: "BSI-APP-JAILBREAK"
    name: "Jailbreak Detection"
    check: "Jailbreak/Root-Detection (Production)"
    severity: "SOLL"
  - id: "BSI-APP-OBFUSCATE"
    name: "Code-Obfuscation"
    check: "Code-Obfuscation für Production-Builds"
    severity: "SOLL"
  - id: "BSI-APP-BIOMETRIC"
    name: "Biometrische Auth"
    check: "Biometrische Auth als Option (expo-local-authentication)"
    severity: "SOLL"
