schema_version: "1.0"
last_reviewed: "2026-01-01"

authentication:
  method: "Supabase Auth (JWT)"
  mfa_supported: true
  session_timeout_minutes: 60
  token_storage: "expo-secure-store (mobile), httpOnly cookie (web)"

authorization:
  model: "RBAC"
  enforcement:
    - "Supabase Row Level Security (RLS)"
    - "Backend middleware (FastAPI Depends)"
  roles:
    - name: "user"
      description: "Standard user"
    - name: "admin"
      description: "Administrative access"

encryption:
  at_rest: "AES-256-GCM (Supabase PostgreSQL)"
  in_transit: "TLS 1.3"
  key_management: "Supabase managed"

input_validation:
  backend: "Pydantic v2 models (whitelist approach)"
  frontend: "Zod + react-hook-form"
  approach: "Server-side validation is authoritative"

logging:
  format: "Structured JSON (structlog)"
  pii_policy: "No PII in logs. Use pseudonymized user IDs."
  retention_days: 30

rate_limiting:
  public_endpoints: 30
  authenticated_endpoints: 60
  unit: "requests per minute"

dependency_management:
  backend: "Poetry with lock file"
  frontend: "npm with lock file"
  vulnerability_scanning: "ruff security rules + npm audit"

container_security:
  base_image: "python:3.12-slim"
  non_root: true
  read_only_fs: true
  resource_limits: true
